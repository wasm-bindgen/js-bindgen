name: Lint

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  code-ql:
    name: CodeQL ${{ matrix.language.name }}

    runs-on: ubuntu-latest

    timeout-minutes: 20

    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - { language: actions, name: Actions }
          - { language: javascript-typescript, name: JS/TS }
          - { language: rust, name: Rust }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language.language }}
          config: |
            queries:
              - uses: security-and-quality
            query-filters:
              - exclude:
                  id: actions/unpinned-tag
              - exclude:
                  id: actions/missing-workflow-permissions
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language.language }}

  eslint:
    name: ESLint

    runs-on: ubuntu-slim

    timeout-minutes: 20

    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        directory:
          - host/ld/src/js
          - host/runner/src/js

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: NPM Install
        run: npm install --no-audit --no-fund
      - name: Install ESLint SARIF Formatter
        run: npm install @microsoft/eslint-formatter-sarif@latest --no-audit --no-fund
      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: true
        run:
          npx eslint -f @microsoft/eslint-formatter-sarif -o ${{ github.workspace
          }}/../results/eslint.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
