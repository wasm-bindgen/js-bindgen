name: Test

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  host:
    name: Test Host ${{ matrix.os.description }}

    runs-on: ${{ matrix.os.os }}

    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - { os: ubuntu-latest, description: Linux }
          - { os: macos-latest, description: macOS }
          - { os: windows-latest, description: Windows }

    defaults:
      run:
        working-directory: host

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust Wasm Target
        run: rustup target add wasm32-unknown-unknown
      - name: Install LLVM
        uses: ZhongRuoyu/setup-llvm@ec41d6e5f3c15c96fa642a49c6e7effac6261778
        with:
          # Rustc v1.93
          llvm-version: 21
      - name: Run Tests
        run: cargo test --all-features --no-fail-fast

  client:
    name:
      Test Client ${{ matrix.os.description }} ${{ matrix.target.description }} ${{
      matrix.target-feature.description }}

    runs-on: ${{ matrix.os.os }}

    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - { os: ubuntu-latest, description: Linux }
          - { os: macos-latest, description: macOS }
        target:
          - { target: wasm32-unknown-unknown, install: true, rust: stable, description: Wasm32 }
          - {
              target: wasm64-unknown-unknown,
              install: false,
              rust: nightly,
              components: -c rust-src,
              args: '-Zbuild-std="panic_abort,std"',
              description: Wasm64,
            }
        target-feature:
          - {}
          - {
              rust: nightly,
              components: -c rust-src,
              rustflags: -Ctarget-feature=+atomics -Clink-arg=--shared-memory,
              args: '-Zbuild-std="panic_abort,std"',
              description: Atomics,
            }
        exclude:
          - os: { description: macOS }
            target: { description: Wasm64 }

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        run:
          rustup install --no-update --profile minimal --override ${{
          matrix.target-feature.components || matrix.target.components }} ${{
          matrix.target-feature.rust || matrix.target.rust }}
      - name: Install Target
        if: matrix.target.install
        run: rustup target add ${{ matrix.target.target }}
      - name: Install LLVM
        uses: ZhongRuoyu/setup-llvm@ec41d6e5f3c15c96fa642a49c6e7effac6261778
        with:
          # Rustc v1.93
          llvm-version: 21
      - name: Update Node.js
        if: runner.os == 'Linux'
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Install Deno
        if: runner.os == 'Linux'
        uses: denoland/setup-deno@v2
      - name: Build Host Tools
        working-directory: host
        run: cargo +stable build -p js-bindgen-ld -p js-bindgen-runner -p js-bindgen-web-driver
      - name: Run WebDriver Session Manager - Chrome
        if: runner.os == 'Linux'
        working-directory: host
        run: |
          cargo +stable run -p js-bindgen-web-driver -- -p 8000 chrome &
          echo "JBG_TEST_CHROME_DRIVER_REMOTE=http://127.0.0.1:8000" >> $GITHUB_ENV
      - name: Run WebDriver Session Manager - Firefox
        if: runner.os == 'Linux'
        working-directory: host
        run: |
          cargo +stable run -p js-bindgen-web-driver -- -p 8001 gecko &
          echo "JBG_TEST_GECKO_DRIVER_REMOTE=http://127.0.0.1:8001" >> $GITHUB_ENV
      - name: Run WebDriver Session Manager - Safari
        if: runner.os == 'macOS'
        working-directory: host
        run: |
          cargo +stable run -p js-bindgen-web-driver -- -p 8002 safari &
          echo "JBG_TEST_SAFARI_DRIVER_REMOTE=http://127.0.0.1:8002" >> $GITHUB_ENV
      - name: Set Target `RUSTFLAGS`
        run: |
          TARGET=$(echo "${{ matrix.target.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET}_RUSTFLAGS=${{ matrix.target-feature.rustflags }}" >> $GITHUB_ENV
      - name: Build Tests
        run:
          cargo test --workspace --target ${{ matrix.target.target }} ${{ matrix.target-feature.args
          || matrix.target.args }} --no-run
      - name: Run Tests - NodeJs
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: node-js
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Deno
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: deno
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Chrome
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: chrome-driver
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Chrome - Dedicated Worker
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: chrome-driver
          JBG_TEST_WORKER: dedicated
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Chrome - Shared Worker
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: chrome-driver
          JBG_TEST_WORKER: shared
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Chrome - Service Worker
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: chrome-driver
          JBG_TEST_WORKER: service
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Firefox
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: gecko-driver
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Firefox - Dedicated Worker
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: gecko-driver
          JBG_TEST_WORKER: dedicated
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Firefox - Shared Worker
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: gecko-driver
          JBG_TEST_WORKER: shared
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Firefox - Service Worker
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: gecko-driver
          JBG_TEST_WORKER: service
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari
        if: runner.os == 'macOS'
        env:
          JBG_TEST_RUNNER: safari-driver
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - Dedicated Worker
        if: runner.os == 'macOS'
        env:
          JBG_TEST_RUNNER: safari-driver
          JBG_TEST_WORKER: dedicated
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - Shared Worker
        if: runner.os == 'macOS'
        env:
          JBG_TEST_RUNNER: safari-driver
          JBG_TEST_WORKER: shared
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - Service Worker
        if: runner.os == 'macOS'
        env:
          JBG_TEST_RUNNER: safari-driver
          JBG_TEST_WORKER: service
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Set Target `RUSTFLAGS` - SAB
        if: matrix.target-feature.description == 'Atomics'
        run: |
          TARGET=$(echo "${{ matrix.target.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET}_RUSTFLAGS=${{ matrix.target-feature.rustflags }} --cfg js_sys_target_feature=\"sab\"" >> $GITHUB_ENV
      - name: Build Tests - SAB
        if: matrix.target-feature.description == 'Atomics'
        run:
          cargo test --workspace --target ${{ matrix.target.target }} ${{ matrix.target-feature.args
          || matrix.target.args }} --no-run
      - name: Run Tests - NodeJs - SAB
        if: runner.os == 'Linux' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: node-js
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Deno - SAB
        if: runner.os == 'Linux' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: deno
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - SAB
        if: runner.os == 'macOS' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: safari-driver
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - SAB - Dedicated Worker
        if: runner.os == 'macOS' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: safari-driver
          JBG_TEST_WORKER: dedicated
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - SAB - Shared Worker
        if: runner.os == 'macOS' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: safari-driver
          JBG_TEST_WORKER: shared
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Safari - SAB - Service Worker
        if: runner.os == 'macOS' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: safari-driver
          JBG_TEST_WORKER: service
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Set Target `RUSTFLAGS` - RAB
        if: runner.os == 'Linux'
        run: |
          TARGET=$(echo "${{ matrix.target.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET}_RUSTFLAGS=${{ matrix.target-feature.rustflags }} --cfg js_sys_target_feature=\"unstable-rab\"" >> $GITHUB_ENV
      - name: Build Tests - RAB
        if: runner.os == 'Linux'
        run:
          cargo test --workspace --target ${{ matrix.target.target }} ${{ matrix.target-feature.args
          || matrix.target.args }} --no-run
      - name: Run Tests - NodeJs - RAB
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: node-js
          JBG_TEST_NODE_JS_ARGS: --experimental-wasm-rab-integration
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Deno - RAB
        if: runner.os == 'Linux'
        env:
          JBG_TEST_RUNNER: deno
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Set Target `RUSTFLAGS` - All
        if: runner.os == 'Linux' && matrix.target-feature.description == 'Atomics'
        run: |
          TARGET=$(echo "${{ matrix.target.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET}_RUSTFLAGS=${{ matrix.target-feature.rustflags }} --cfg js_sys_target_feature=\"sab\" --cfg js_sys_target_feature=\"unstable-rab\"" >> $GITHUB_ENV
      - name: Build Tests - All
        if: runner.os == 'Linux' && matrix.target-feature.description == 'Atomics'
        run:
          cargo test --workspace --target ${{ matrix.target.target }} ${{ matrix.target-feature.args
          || matrix.target.args }} --no-run
      - name: Run Tests - NodeJs - All
        if: runner.os == 'Linux' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: node-js
          JBG_TEST_NODE_JS_ARGS: --experimental-wasm-rab-integration
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
      - name: Run Tests - Deno - All
        if: runner.os == 'Linux' && matrix.target-feature.description == 'Atomics'
        env:
          JBG_TEST_RUNNER: deno
        run:
          cargo test --workspace --no-fail-fast --target ${{ matrix.target.target }} ${{
          matrix.target-feature.args || matrix.target.args }}
